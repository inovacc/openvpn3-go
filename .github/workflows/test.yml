name: test
on: [push, pull_request]

jobs:
  test:
    name: test ${{ matrix.os }} cgo=${{ matrix.cgo }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        cgo: ["0", "1"]
        exclude:
          - os: windows-latest
            cgo: "1" # real Windows cgo engine is built in the windows-cgo job
    env:
      CGO_ENABLED: ${{ matrix.cgo }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go build ./...
      - run: go test ./...
      - name: test tools module
        run: go -C tools test ./...

  windows-cgo:
    name: windows cgo (real vendored engine)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-openssl
      - name: Wire UCRT64 OpenSSL + gcc (location-independent)
        shell: msys2 {0}
        run: |
          echo "OPENVPN3_SSLDIR=$(cygpath -w /ucrt64)" >> "$GITHUB_ENV"
          cygpath -w /ucrt64/bin >> "$GITHUB_PATH"
      - name: Bootstrap OpenSSL cgo flags (dogfood dev helper)
        run: go run ./cmd/openvpn bootstrap
      - name: Build cgo engine
        env:
          CGO_ENABLED: "1"
        run: go build ./...
      - name: Test (short; skips live integration)
        env:
          CGO_ENABLED: "1"
        run: go test -short ./...
